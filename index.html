<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperOS 2.0 - Xiaomi 17 Ultra</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">

<div id="phone">
    <div class="wallpaper"></div>

    <div id="setup-wizard">
        <div class="setup-content">
            <img src="https://raw.githubusercontent.com/Nizaax29/iko/refs/heads/main/Xiaomi_HyperOS_%2528December_2023%2529.webp" width="80" alt="HyperOS">
            <h1 style="margin-top: 20px;">HyperOS 2.0</h1>
            <p style="color: #888; margin-top: 10px;" data-i18n="setup_desc">Configurez votre compte Xiaomi pour continuer.</p>
            
            <div style="margin-top: 40px; text-align: left; width: 100%;">
                <label data-i18n="account_name">Nom du compte</label>
                <input type="text" id="account-name" placeholder="Ex: poco.note.13" class="setup-input">
            </div>

            <button class="setup-btn" onclick="finishSetup()" data-i18n="start_btn">Démarrer le système</button>
        </div>
    </div>

    <div id="main-ui" style="display: none;">
        <div class="status-bar" onclick="toggleCC()">
            <span id="clock">12:00</span>
            <div class="status-icons">
                <i data-lucide="signal" size="14"></i>
                <i data-lucide="wifi" size="14"></i>
                <i data-lucide="battery-full" size="14"></i>
            </div>
        </div>

        <div id="home-grid">
            <div class="app" onclick="openApp('settings', this)"><div class="icon bg-grey"><i data-lucide="settings"></i></div><span class="label" data-i18n="app_settings">Paramètres</span></div>
            <div class="app" onclick="openApp('calc', this)"><div class="icon bg-orange"><i data-lucide="calculator"></i></div><span class="label" data-i18n="app_calc">Calculatrice</span></div>
            <div></div> <div></div> <div style="grid-column: span 4; height: 120px;"></div>

            <div class="app" onclick="openApp('hyper', this)"><div class="icon bg-img"><img src="https://raw.githubusercontent.com/Nizaax29/iko/refs/heads/main/Xiaomi_HyperOS_%2528December_2023%2529.webp" width="100%"></div><span class="label">HyperOS</span></div>
            <div class="app"><div class="icon bg-blue"><i data-lucide="image"></i></div><span class="label" data-i18n="app_gallery">Galerie</span></div>
        </div>

        <div class="dock">
            <div class="app" onclick="openApp('phone', this)">
                <div class="icon bg-img"><img src="https://raw.githubusercontent.com/Nizaax29/iko/refs/heads/main/system_dialer.png" width="100%"></div>
            </div>
            <div class="app"><div class="icon bg-msg"><i data-lucide="message-square"></i></div></div>
            <div class="app"><div class="icon bg-cam"><i data-lucide="camera"></i></div></div>
            <div class="app"><div class="icon bg-browser"><i data-lucide="globe"></i></div></div>
        </div>

        <div id="control-center">
            <h2 style="margin-bottom:20px; font-weight: 600;" data-i18n="cc_title">Centre de Contrôle</h2>
            <div class="cc-grid">
                <div class="cc-tile active" onclick="this.classList.toggle('active')"><i data-lucide="wifi"></i> <span data-i18n="wifi">Wi-Fi</span></div>
                <div class="cc-tile active" onclick="this.classList.toggle('active')"><i data-lucide="bluetooth"></i> <span data-i18n="bluetooth">Bluetooth</span></div>
                <div class="cc-tile" onclick="toggleDarkMode()"><i data-lucide="moon"></i> <span data-i18n="dark_mode">Mode Sombre</span></div>
                <div class="cc-tile"><i data-lucide="flashlight"></i> <span data-i18n="torch">Torche</span></div>
            </div>
            <button class="close-cc-btn" onclick="toggleCC()" data-i18n="close">Fermer</button>
        </div>

        <div id="app-layer">
            <div id="app-content"></div>
            <div class="ai-bar" onclick="closeApp()"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
